<svg width="100%" viewBox="0 0 680 1420" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Home Assistant EV Energy Manager – complete automation flow</title>
<desc>Flow diagram of charging priorities: Master Stop, Force Charge, Night F3, PV Surplus, Idle. Includes sections on load balancing, SOC targets, safety checks, and configurable entities.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;  }
    .th  { font-size: 14px; font-weight: 500; }
    .ts  { font-size: 12px; font-weight: 400; }
    .arr { stroke: #888; stroke-width: 1.2;  }
    .leader { stroke: #aaa; stroke-width: 0.5; stroke-dasharray: 3 3;  }
      .ts    {  }
      .arr   { stroke: #666; }
      .leader { stroke: #555; }
    }
  </style>
</defs>
<rect width="680" height="1420" fill="#ffffff"/>

<!-- ════════════════ START ════════════════ -->
<rect x="215" y="20" width="250" height="44" rx="22" fill="#5DCAA5" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central" fill="#085041">Vehicle connected</text>

<line x1="340" y1="64" x2="340" y2="100" class="arr" marker-end="url(#arrow)"/>

<!-- ════════════════ DECISION 1: MASTER STOP ════════════════ -->
<rect x="210" y="100" width="260" height="52" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="340" y="120" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Master Stop active?</text>
<text class="ts" x="340" y="140" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a">absolute priority</text>

<!-- YES left -->
<line x1="210" y1="126" x2="150" y2="126" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="180" y="115" text-anchor="middle" fill="#1a1a1a">yes</text>

<!-- MASTER STOP block -->
<rect x="20" y="100" width="130" height="80" rx="8" fill="#F7C1C1" stroke="#A32D2D" stroke-width="0.5"/>
<text class="th" x="85" y="124" text-anchor="middle" dominant-baseline="central" fill="#791F1F">Master Stop</text>
<text class="ts" x="85" y="146" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a">Set mode 3 (pause)</text>
<text class="ts" x="85" y="164" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a">Revoke authorization</text>

<line x1="85" y1="180" x2="85" y2="208" class="arr" marker-end="url(#arrow)"/>
<rect x="20" y="208" width="130" height="34" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
<text class="ts" x="85" y="225" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a">Charging blocked</text>

<!-- NO down -->
<line x1="340" y1="152" x2="340" y2="188" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="170" text-anchor="middle" fill="#1a1a1a">no</text>

<!-- ════════════════ DECISION 2: FORZA ════════════════ -->
<rect x="210" y="188" width="260" height="52" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="340" y="208" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Force Charge active?</text>
<text class="ts" x="340" y="228" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a">ignores tariffs and PV</text>

<!-- YES right -->
<line x1="470" y1="214" x2="570" y2="214" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="520" y="204" text-anchor="middle" fill="#1a1a1a">yes</text>

<!-- FORZA block -->
<rect x="570" y="188" width="96" height="80" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
<text class="th" x="618" y="212" text-anchor="middle" dominant-baseline="central" fill="#633806">Force</text>
<text class="ts" x="618" y="230" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a">Mode Normal</text>
<text class="ts" x="618" y="248" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a">≤ contract limit</text>

<line x1="618" y1="268" x2="618" y2="296" class="arr" marker-end="url(#arrow)"/>
<rect x="570" y="296" width="96" height="52" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="618" y="311" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a">STOP</text>
<text class="ts" x="618" y="327" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a">vehicle target</text>
<text class="ts" x="618" y="341" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a">reached</text>
<path d="M618 348 L618 360 L480 360" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- NO down -->
<line x1="340" y1="240" x2="340" y2="276" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="258" text-anchor="middle" fill="#1a1a1a">no</text>

<!-- ════════════════ DECISION 3: NIGHT F3 ════════════════ -->
<rect x="200" y="276" width="280" height="52" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="340" y="296" text-anchor="middle" dominant-baseline="central" fill="#0C447C">F3 tariff + night?</text>
<text class="ts" x="340" y="316" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a">sun below + force OFF + SOC &lt; user target</text>

<!-- YES right connector -->
<path d="M480 302 L618 302 L618 370" fill="none" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
<text class="ts" x="549" y="292" text-anchor="middle" fill="#1a1a1a">yes</text>

<!-- NIGHT block -->
<rect x="570" y="370" width="96" height="80" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="618" y="394" text-anchor="middle" dominant-baseline="central" fill="#26215C">Night F3</text>
<text class="ts" x="618" y="412" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a">Mode Normal</text>
<text class="ts" x="618" y="430" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a">≤ night limit</text>

<line x1="618" y1="450" x2="618" y2="478" class="arr" marker-end="url(#arrow)"/>
<rect x="570" y="478" width="96" height="48" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="618" y="497" text-anchor="middle" dominant-baseline="central" fill="#0C447C">SOC ≥</text>
<text class="th" x="618" y="515" text-anchor="middle" dominant-baseline="central" fill="#0C447C">user target?</text>

<path d="M570 502 L540 502 L540 410 L570 410" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="555" y="498" text-anchor="middle" fill="#1a1a1a">no</text>

<line x1="618" y1="526" x2="618" y2="556" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="628" y="541" text-anchor="middle" fill="#1a1a1a">yes</text>
<rect x="570" y="556" width="96" height="52" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="618" y="571" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a">STOP</text>
<text class="ts" x="618" y="587" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a">user target</text>
<text class="ts" x="618" y="601" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a">reached</text>

<!-- NO down -->
<line x1="340" y1="328" x2="340" y2="364" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="346" text-anchor="middle" fill="#1a1a1a">no</text>

<!-- ════════════════ DECISION 4: SURPLUS FV ════════════════ -->
<rect x="190" y="364" width="300" height="52" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="340" y="384" text-anchor="middle" dominant-baseline="central" fill="#0C447C">PV Surplus available?</text>
<text class="ts" x="340" y="404" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a">amp ≥ 7A for 30s + SOC &lt; vehicle target</text>

<!-- YES left -->
<line x1="190" y1="390" x2="110" y2="390" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="150" y="379" text-anchor="middle" fill="#1a1a1a">yes</text>

<!-- SURPLUS FV block -->
<rect x="20" y="364" width="90" height="80" rx="8" fill="#5DCAA5" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="65" y="388" text-anchor="middle" dominant-baseline="central" fill="#04342C">PV Surplus</text>
<text class="ts" x="65" y="406" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a">Mode Solar</text>
<text class="ts" x="65" y="424" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a">modulate amp</text>

<line x1="65" y1="444" x2="65" y2="472" class="arr" marker-end="url(#arrow)"/>
<rect x="20" y="472" width="90" height="48" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="65" y="491" text-anchor="middle" dominant-baseline="central" fill="#0C447C">amp &lt; 5.5A</text>
<text class="th" x="65" y="509" text-anchor="middle" dominant-baseline="central" fill="#0C447C">for 60s?</text>

<path d="M110 496 L140 496 L140 404 L110 404" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="125" y="490" text-anchor="middle" fill="#1a1a1a">no</text>

<line x1="65" y1="520" x2="65" y2="552" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="75" y="534" text-anchor="middle" fill="#1a1a1a">yes</text>
<rect x="20" y="552" width="90" height="52" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="65" y="567" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a">STOP</text>
<text class="ts" x="65" y="583" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a">vehicle target</text>
<text class="ts" x="65" y="597" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a">reached</text>

<!-- NO → IDLE -->
<line x1="340" y1="416" x2="340" y2="452" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="350" y="434" text-anchor="middle" fill="#1a1a1a">no</text>

<!-- IDLE -->
<rect x="220" y="452" width="240" height="44" rx="22" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="340" y="474" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a">Idle – waiting</text>

<!-- ════════════════ SEZIONE BILANCIAMENTO ════════════════ -->
<line x1="40" y1="615" x2="640" y2="615" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="th" x="340" y="638" text-anchor="middle" fill="#1a1a1a">Dynamic load balancing</text>
<text class="ts" x="340" y="656" text-anchor="middle" fill="#1a1a1a">active while charging</text>

<rect x="20"  y="670" width="148" height="138" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="94"  y="693" text-anchor="middle" dominant-baseline="central" fill="#04342C">Input sensors</text>
<text class="ts" x="94"  y="712" text-anchor="middle" fill="#1a1a1a">PV production (W)</text>
<text class="ts" x="94"  y="730" text-anchor="middle" fill="#1a1a1a">Grid import/export (W)</text>
<text class="ts" x="94"  y="748" text-anchor="middle" fill="#1a1a1a">Wallbox power (W)</text>
<text class="ts" x="94"  y="766" text-anchor="middle" fill="#1a1a1a">Voltage (V)</text>
<text class="ts" x="94"  y="784" text-anchor="middle" fill="#1a1a1a">Contract limit (W)</text>

<line x1="168" y1="739" x2="196" y2="739" class="arr" marker-end="url(#arrow)"/>

<rect x="196" y="670" width="130" height="138" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="261" y="693" text-anchor="middle" dominant-baseline="central" fill="#26215C">PV Surplus</text>
<text class="ts" x="261" y="716" text-anchor="middle" fill="#1a1a1a">amp_fv =</text>
<text class="ts" x="261" y="734" text-anchor="middle" fill="#1a1a1a">(-grid + offset)</text>
<text class="ts" x="261" y="752" text-anchor="middle" fill="#1a1a1a">÷ voltage</text>
<text class="ts" x="261" y="774" text-anchor="middle" fill="#1a1a1a">min 6A</text>

<line x1="326" y1="739" x2="354" y2="739" class="arr" marker-end="url(#arrow)"/>

<rect x="354" y="670" width="148" height="138" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
<text class="th" x="428" y="693" text-anchor="middle" dominant-baseline="central" fill="#412402">Load balance</text>
<text class="ts" x="428" y="712" text-anchor="middle" fill="#1a1a1a">total = grid + PV</text>
<text class="ts" x="428" y="730" text-anchor="middle" fill="#1a1a1a">house = total - wallbox</text>
<text class="ts" x="428" y="750" text-anchor="middle" fill="#1a1a1a">margin =</text>
<text class="ts" x="428" y="768" text-anchor="middle" fill="#1a1a1a">limit - house</text>
<text class="ts" x="428" y="786" text-anchor="middle" fill="#1a1a1a">amp = margin ÷ V</text>

<line x1="502" y1="739" x2="520" y2="739" class="arr" marker-end="url(#arrow)"/>

<rect x="520" y="670" width="140" height="138" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="590" y="693" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">Ampere → WB</text>
<text class="ts" x="590" y="712" text-anchor="middle" fill="#1a1a1a">min(amp_fv,</text>
<text class="ts" x="590" y="730" text-anchor="middle" fill="#1a1a1a">amp_contract)</text>
<text class="ts" x="590" y="750" text-anchor="middle" fill="#1a1a1a">clamped 6–25A</text>
<text class="ts" x="590" y="770" text-anchor="middle" fill="#1a1a1a">Δ ≥ 0.5A before</text>
<text class="ts" x="590" y="788" text-anchor="middle" fill="#1a1a1a">sending</text>

<!-- ════════════════ TARGET SOC ════════════════ -->
<line x1="40" y1="830" x2="640" y2="830" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="th" x="340" y="858" text-anchor="middle" fill="#1a1a1a">SOC Target</text>

<rect x="20"  y="872" width="294" height="58" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
<text class="th" x="167" y="893" text-anchor="middle" dominant-baseline="central" fill="#412402">User target</text>
<text class="ts" x="167" y="913" text-anchor="middle" fill="#1a1a1a">charge_limit_manual → Night F3 charging</text>

<rect x="330" y="872" width="330" height="58" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="495" y="893" text-anchor="middle" dominant-baseline="central" fill="#04342C">Vehicle target</text>
<text class="ts" x="495" y="913" text-anchor="middle" fill="#1a1a1a">limite_batteria_auto → PV Surplus e Force</text>

<!-- ════════════════ MODE PRIORITY ════════════════ -->
<line x1="40" y1="952" x2="640" y2="952" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="th" x="340" y="978" text-anchor="middle" fill="#1a1a1a">Mode priority</text>

<rect x="74"  y="993" width="120" height="34" rx="6" fill="#F7C1C1" stroke="#A32D2D" stroke-width="0.5"/>
<text class="th" x="134" y="1010" text-anchor="middle" dominant-baseline="central" fill="#791F1F">1. Master Stop</text>
<rect x="208" y="993" width="90"  height="34" rx="6" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
<text class="th" x="253" y="1010" text-anchor="middle" dominant-baseline="central" fill="#633806">2. Force</text>
<rect x="312" y="993" width="96"  height="34" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="360" y="1010" text-anchor="middle" dominant-baseline="central" fill="#26215C">3. Night F3</text>
<rect x="422" y="993" width="110" height="34" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="477" y="1010" text-anchor="middle" dominant-baseline="central" fill="#04342C">4. PV Surplus</text>
<rect x="546" y="993" width="60"  height="34" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="576" y="1010" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a">5. Idle</text>

<!-- ════════════════ SAFETY + ENTITIES ════════════════ -->
<line x1="40" y1="1048" x2="640" y2="1048" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>

<text class="th" x="170" y="1074" text-anchor="middle" fill="#1a1a1a">Safety checks</text>
<text class="th" x="500" y="1074" text-anchor="middle" fill="#1a1a1a">Configurable entities</text>

<rect x="20"  y="1088" width="300" height="128" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="ts" x="38" y="1114" fill="#1a1a1a">✓  Respects contract power limit</text>
<text class="ts" x="38" y="1134" fill="#1a1a1a">✓  Configurable grid import offset (W)</text>
<text class="ts" x="38" y="1154" fill="#1a1a1a">✓  Automatic stop at SOC target</text>
<text class="ts" x="38" y="1174" fill="#1a1a1a">✓  Immediate revoke with Master Stop</text>
<text class="ts" x="38" y="1194" fill="#1a1a1a">✓  Minimum current 6A · maximum 25A</text>

<rect x="340" y="1088" width="300" height="128" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" x="358" y="1114" fill="#1a1a1a">number: user / vehicle SOC target</text>
<text class="ts" x="358" y="1134" fill="#1a1a1a">number: contract power limit (W)</text>
<text class="ts" x="358" y="1154" fill="#1a1a1a">number: night power limit (W)</text>
<text class="ts" x="358" y="1174" fill="#1a1a1a">number: allowed grid import (offset W)</text>
<text class="ts" x="358" y="1194" fill="#1a1a1a">switch: master stop / force / night</text>

<!-- ════════════════ LEGENDA + VERSIONE ════════════════ -->
<line x1="40" y1="1238" x2="640" y2="1238" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>

<text class="ts" x="340" y="1262" text-anchor="middle" fill="#1a1a1a">Colour legend</text>

<rect x="40"  y="1278" width="14" height="14" rx="3" fill="#5DCAA5"/>
<text class="ts" x="60"  y="1285" dominant-baseline="central" fill="#1a1a1a">State / start / stop</text>
<rect x="168" y="1278" width="14" height="14" rx="3" fill="#85B7EB"/>
<text class="ts" x="188" y="1285" dominant-baseline="central" fill="#1a1a1a">Decision</text>
<rect x="274" y="1278" width="14" height="14" rx="3" fill="#EF9F27"/>
<text class="ts" x="294" y="1285" dominant-baseline="central" fill="#1a1a1a">Force</text>
<rect x="352" y="1278" width="14" height="14" rx="3" fill="#AFA9EC"/>
<text class="ts" x="372" y="1285" dominant-baseline="central" fill="#1a1a1a">Night F3</text>
<rect x="448" y="1278" width="14" height="14" rx="3" fill="#1D9E75"/>
<text class="ts" x="468" y="1285" dominant-baseline="central" fill="#1a1a1a">PV Surplus</text>
<rect x="556" y="1278" width="14" height="14" rx="3" fill="#F09595"/>
<text class="ts" x="576" y="1285" dominant-baseline="central" fill="#1a1a1a">Stop</text>

<text class="ts" x="340" y="1340" text-anchor="middle" fill="#1a1a1a">v1.3.0 – github.com/atcodrinky/ha-supersmart-ev-charging</text>
<text class="ts" x="340" y="1360" text-anchor="middle" fill="#1a1a1a">SuperSmart EV Charging – HACS Integration</text>

</svg>
